<!--inside style-->
<style>
    ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #333333;
    display: flex;<!--for center tag-->
    justify-content: center;<!--for center tag-->
    }

    ul li {
    float: left;
    border-right:1px solid #bbbbbb;<!--tag border-->
    }
    <!--tag border-->
    ul li:last-child {
    border-right: none;
    }
    <!--Fixed Top-->
    ul {
    position: fixed;
    top: 0;
    width: 100%;
    }
    <!--sticky bar-->
    ul {
    position: sticky;
    top: 0;
    }
    ul li a {
    display: block;
    color: white;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    }

    ul li a:hover {
    background-color: #111111;
    }

    </style>

<!--inside body-->
<ul>
  <li><a href="#home">Home</a></li>
  <li><a href="#news">News</a></li>
  <li><a href="#contact">Contact</a></li>
  <li><a href="#about">About</a></li>
   <li style="float:right"><a href="#about">About</a></li><!-- for right-->
</ul>
