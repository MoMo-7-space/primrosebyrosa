<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    .custom-navbar {
        background-color: #ecb9b9 !important;
        border-bottom: 2px solid #df98a3; 
    }

    /* Brand Name (Primrose By Rosa) အရောင်ပြောင်းရန် */
    .navbar-brand {
        color: #df6d6d !important; 
        font-family: 'Georgia', serif;
    }

    /* Menu စာသားတွေရဲ့ အရောင် */
    .nav-link {
        color: #5e3636 !important;
    }

    /* Mouse ထောက်လိုက်ရင် ပြောင်းမယ့်အရောင် (Hover) */
    .nav-link:hover {
        color: #a34949 !important;
    }

    /* Search Button အရောင်ပြောင်းရန် */
    .btn-outline-success {
        color: #ac6c6c;
        border-color: #d02090;
    }

    .btn-outline-success:hover {
        background-color: #ce7979;
        border-color: #c47676;
        color: white;
    }
</style>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Primrose By Rosa</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Items
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Rings</a></li>
            <li><a class="dropdown-item" href="#">Necklaces</a></li>
             <li><a class="dropdown-item" href="#">Earings</a></li>
              <li><a class="dropdown-item" href="#">Handchains</a></li>
               <li><a class="dropdown-item" href="#">Handbags</a></li>
            
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>
</body>
</html>
