<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloCoder - Authentic Myanmar Flavors</title>
   
    <style>
        /* --- Global Styles --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #772424; /* မူလ အရောင် */
    color: #ffffff;
    line-height: 1.6;
}


.container {
    width: 90%;
    max-width: 1100px; 
    margin: 0 auto;
    display: flex;
    align-items: center;
}

/* --- Navbar Styling --- */
.navbar {
    /* Glassmorphism Effect */
    background: rgba(164, 145, 120, 0.8); /* နောက်ခံကို အကြည်ရောင် ၈၀% ထား */
    backdrop-filter: blur(10px); /* အနောက်ကပုံကို ဝါးသွားစေဖို့ */
    -webkit-backdrop-filter: blur(10px);
    
    height: 70px; /* အနည်းငယ် ပိုကျဉ်းလိုက်ရင် ပိုကြည့်ကောင်းပါတယ် */
    width: 100%;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(108, 66, 66, 0.1); /* အောက်ခြေမှာ မျဉ်းပါးပါးလေးထည့် */
    display: flex;
    align-items: center;
}


.logo img {
    margin-top: 10px;
    height: 60px;
    width: auto;
    display: block;
}

.nav-links {
    display: flex;
    list-style: none;
}

.nav-links li {
    margin-left: 35px;
}

.nav-links li a {
    color: #ffffff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    text-transform: capitalize; /* အကုန် အကြီးစာလုံးထက် ပထမစာလုံးပဲ ကြီးတာက ပိုကြည်လင်ပါတယ် */
    padding: 8px 15px;
    transition: all 0.4s ease;
    position: relative;
}

.nav-links li a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 0;
    left: 50%;
    background-color: #db2e98;
    transition: all 0.3s ease;
    transform: translateX(-50%);
}
.nav-links li a:hover::after {
    width: 70%; /* Hover လုပ်ရင် မျဉ်းလေး ထွက်လာမယ် */
}
.nav-links li a:hover {
    color: #db2e98;
}


.hero-section {
    padding: 60px 0;
}

.content-center {
    flex-direction: column; /* စာနဲ့ ပုံကို အပေါ်အောက် ထားဖို့ */
    text-align: center;
}

.welcomemessage {
    font-size: 28px;
    margin-bottom: 40px;
    font-weight: 500;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

/* --- Banner Styling --- */
.banner-box {
    width: 100%;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 3px solid rgba(255, 255, 255, 0.1);
}

.banner-img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.5s ease;
}

.banner-img:hover {
    transform: scale(1.02); /* ပုံပေါ် mouse တင်ရင် နည်းနည်း ကြွလာမယ် */
}

/* --- Mobile View (Responsive) --- */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        width: 95%;
    }

    .navbar {
        height: auto;
        padding: 20px 0;
    }

    .nav-links {
        margin-top: 20px;
        justify-content: center;
        flex-wrap: wrap; /* ဖုန်းမှာ menu တွေ ဆန့်အောင် အောက်ဆင်းပေးမယ် */
    }

    .nav-links li {
        margin: 5px 15px;
    }

    .welcomemessage {
        font-size: 20px;
    }
}
    </style>
</head>
<body>

    <div class="main-wrapper">
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <img src="logo.png" alt="HelloCoder Logo">
                </div>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Nation</a></li>
                    <li><a href="#">Special</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </nav>

        <main class="hero-section">
            <div class="container content-center">
                <h1 class="welcomemessage">ရသာစုံလင် မြန်ပြည်တခွင်၊ စားသောက်မျှဝေ နွေးထွေးစေသား.......</h1>
                
                <div class="banner-box">
                    <img src="bunderone.jpg" alt="Myanmar Culture Banner" class="banner-img">
                </div>
            </div>
        </main>
    </div>

</body>
</html>
