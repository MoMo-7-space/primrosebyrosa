<!DOCTYPE html>
<html>
<head>
<style>
.dropbtn {
  background-color: #4CAF50;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 200px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.dropdown-content a:hover {
  background-color: #f1f1f1;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown:hover .dropbtn {
  background-color: #3e8e41;
}
/* Items ဆိုတဲ့ button ရဲ့နောက်မှာ triangle ထည့်ခြင်း */
        .dropbtn::after {
            content: " ▼"; /* အောက်ညွှန်ပြတဲ့ triangle သင်္ကေတ */
            font-size: 10px; /* အရွယ်အစား */
            padding-left: 5px; /* စာသားနဲ့ icon ကြား အကွာအဝေး */
            vertical-align: middle;
        } 
          /* Mouse တင်လိုက်ရင် မြားလေးကို ၁၈၀ ဒီဂရီ လှည့်ပစ်မယ် */
.dropdown:hover .dropbtn::after {
    display: inline-block;
    transform: rotate(180deg);
    transition: 0.3s; /* ဖြည်းဖြည်းချင်း လှည့်သွားအောင်လို့ပါ */
}
</style>
</head>
<body>


<div class="dropdown">
  <button class="dropbtn">Dropdown Menu</button>
  <div class="dropdown-content">
  <a href="#">Link 1</a>
  <a href="#">Link 2</a>
  <a href="#">Link 3</a>
  </div>
</div>


</body>
</html>
